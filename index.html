<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Weather App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: rgba(0,0,0,0.2);
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 300px;
    }

    input {
      padding: 10px;
      width: 70%;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #fff;
      color: #333;
      cursor: pointer;
    }

    button:hover {
      background: #ddd;
    }

    .weather {
      margin-top: 20px;
    }

    .temp {
      font-size: 2em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🌤 Weather App</h2>
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Search</button>

    <div class="weather" id="weatherResult"></div>
  </div>

  <script>
    async function getWeather() {
      const city = document.getElementById('city').value;

      if (!city) {
        alert("Please enter a city name");
        return;
      }

      // Mock data to simulate API response
      const mockData = {
        name: "Madrid",
        sys: { country: "ES" },
        main: { temp: 31, humidity: 20 },
        weather: [{ main: "Sunny" }],
        wind: { speed: 0.2 }
      };

      const weatherHTML = `
        <h3>${mockData.name}, ${mockData.sys.country}</h3>
        <div class="temp">${mockData.main.temp}°C</div>
        <p>${mockData.weather[0].main}</p>
        <p>Humidity: ${mockData.main.humidity}%</p>
        <p>Wind Speed: ${mockData.wind.speed} m/s</p>
      `;

      document.getElementById('weatherResult').innerHTML = weatherHTML;
    }
  </script>

</body>
</html>
